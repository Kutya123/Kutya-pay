  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background-color: #000;
      color: #fcb676;
    }
    header, footer {
      padding: 20px;
      text-align: center;
      border: 1px solid #fcb676;
      position: relative;
    }
    header img {
      height: 240px;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #fcb676;
      font-weight: bold;
    }
    .cart-icon {
      position: absolute;
      top: 20px;
      right: 30px;
      cursor: pointer;
    }
    .cart-icon img {
      width: 40px;
      height: 40px;
    }
    #cart-count {
      position: absolute;
      top: -10px;
      right: -10px;
      background: #fcb676;
      color: black;
      border-radius: 50%;
      padding: 4px 8px;
      font-weight: bold;
      font-size: 14px;
    }

    .categories {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 40px;
      padding: 30px 10px;
    }
    .category-item {
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .category-item img {
      width: 180px;
      height: 240px;
      object-fit: cover;
      border: 3px solid #fcb676;
      border-radius: 12px;
    }
    .category-item:hover {
      transform: scale(1.05);
    }

    .category-block {
      display: none;
      padding: 20px;
    }
    .subcategory {
      margin-top: 20px;
    }
    .subcategory-toggle {
      background-color: #fcb676;
      color: black;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
      margin-bottom: 10px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    .product {
      background: #111;
      border: 1px solid #fcb676;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      padding: 10px;
      transition: transform 0.3s;
    }
    .product img {
      width: 100%;
      height: auto;
      border-radius: 5px;
    }
    .product:hover {
      transform: translateY(-5px);
    }
    .product button {
      background-color: #fcb676;
      border: none;
      color: black;
      padding: 8px 16px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    #cart {
      display: none;
      position: fixed;
      top: 80px;
      right: 20px;
      background: #111;
      color: #fcb676;
      border: 2px solid #fcb676;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      max-height: 500px;
      overflow-y: auto;
      z-index: 999;
    }
    #cart h3 {
      margin-top: 0;
    }
    #cart-items li {
      margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      .categories {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>

    const cart = [];

    function addToCart(product) {
      cart.push(product);
      updateCartDisplay();
    }

    function updateCartDisplay() {
      const cartCount = document.getElementById('cart-count');
      const cartItems = document.getElementById('cart-items');
      cartCount.textContent = cart.length;
      cartItems.innerHTML = '';

      cart.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `<strong>${item.title}</strong> — ${item.price}`;
        cartItems.appendChild(li);
      });
    }

    function toggleCart() {
      const cartBox = document.getElementById('cart');
      cartBox.style.display = cartBox.style.display === 'block' ? 'none' : 'block';
    }

    function renderProductGroup(containerId, productArray) {
      const container = document.getElementById(containerId);
      if (!container) return;

      container.innerHTML = '';
      productArray.forEach(product => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <img src="${product.img}" alt="${product.title}">
          <h3>${product.title}</h3>
          <p>${product.price}</p>
          <button onclick='addToCart(${JSON.stringify(product)})'>Добавить в корзину</button>
        `;
        container.appendChild(div);
      });
    }

    function toggleCategory(id) {
      document.querySelectorAll('.category-block').forEach(cat => {
        cat.style.display = cat.id === id ? (cat.style.display === 'block' ? 'none' : 'block') : 'none';
      });
    }

    function toggleSub(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'grid' ? 'none' : 'grid';
    }

    window.addEventListener('DOMContentLoaded', () => {
      renderProductGroup('men-single', products.men.single);
      renderProductGroup('men-set', products.men.set);
      renderProductGroup('women-single', products.women.single);
      renderProductGroup('women-set', products.women.set);
      renderProductGroup('kids-single', products.kids.single);
      renderProductGroup('kids-set', products.kids.set);
    });
